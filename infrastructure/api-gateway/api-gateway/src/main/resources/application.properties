server.port=8080
spring.application.name=API-GATEWAY

eureka.client.service-url.defaultZone=http://10.187.186.207:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=customer-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/customers/**

spring.cloud.gateway.server.webflux.routes[2].id=delivery-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://delivery-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/delivery/**,/api/agents/**

spring.cloud.gateway.server.webflux.routes[3].id=menu-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://menu-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/menu/**,/api/restaurants/**


jwt.secret=food-delivery-super-secret-key-minimum-256-bits-long-key!!

logging.level.root=INFO
logging.level.org.springframework=WARN
logging.pattern.console=%msg%n